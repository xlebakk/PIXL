<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PIXL — Image Processor</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&family=Unbounded:wght@300;400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
<script type="module" src="{{ url_for('static', filename='js/app.js') }}"></script>
</head>
<body>

<header>
  <div class="logo">PIXL<span>.exe</span></div>
  <div class="hline"></div>
  <div class="htag">opencv processor v2.0</div>
  <div style="width:20px; display:flex; justify-content:center;">
    <div id="status-dot"></div>
  </div>
</header>

<aside>
  <div class="blk">
    <div class="blk-label">01 — source</div>
    <div class="drop-target" id="drop-zone">
      <input type="file" id="file-input" accept="image/*">
      <span class="drop-icon">↓</span>
      <p>drop file here<br>or click to browse</p>
    </div>
    <div class="file-info" id="file-info">
      <div class="file-name" id="file-name">—</div>
      <div class="file-meta" id="file-meta">—</div>
    </div>
  </div>

  <div class="blk">
    <div class="blk-label">02 — command</div>
    <div class="cmd-row">
      <input class="cmd-input" type="text" id="cmd-input" placeholder="поверни на 90 / сепия / ..." disabled>
      <button class="run-btn" id="run-btn" disabled>run →</button>
    </div>
    <div class="action-row">
      <button class="ghost-btn" id="reset-btn" disabled>↺ reset</button>
      <button class="ghost-btn" id="dl-btn" disabled>↓ save</button>
    </div>
  </div>

  <div class="blk">
    <div class="blk-label">03 — presets</div>
    <div class="chips-grid" id="chips"></div>
  </div>

  <div class="blk" style="flex:1; overflow-y:auto;">
    <div class="blk-label">04 — log</div>
    <div class="log-feed" id="log"></div>
  </div>
</aside>

<main>
  <div id="camera-view" style="display: none; position: relative;">
    <img src="{{ url_for('video_feed') }}" style="width: 100%; border-radius: 8px;">
    <button id="snap-btn" class="run-btn">Сделать снимок</button>
</div>
  <div class="empty-state" id="empty-state">
    <div style="font-family:var(--display); font-size: 80px; font-weight: 700; color: var(--line2); line-height: 1; letter-spacing: -4px;">IMG</div>
    <div style="color: var(--fg3); font-size: 12px; margin-top: 12px; letter-spacing: 0.06em;">загрузите изображение для начала</div>
  </div>

  <div id="canvas-wrap" style="position: relative; z-index: 1; display: none;">
    <div class="corner tl"></div><div class="corner tr"></div><div class="corner bl"></div><div class="corner br"></div>
    <canvas id="preview-canvas"></canvas>
    <div class="img-badge">
      <span id="badge-size">—</span>
      <span id="badge-op">—</span>
    </div>
  </div>

  <div class="processing-overlay" id="proc-overlay">
    <div class="proc-label" id="proc-label">processing</div>
    <div class="proc-bar-wrap"><div class="proc-bar" id="proc-bar"></div></div>
  </div>
</main>

<script type="module" src="js/app.js"></script>
</body>
</html>
